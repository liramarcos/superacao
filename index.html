<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAção Fotos | Fotografia Esportiva</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: #f0f0f0; line-height: 1.6; }
        
        /* Navbar */
        .top-bar { 
            background-color: #000000; padding: 1rem 2rem; 
            display: flex; align-items: center; border-bottom: 2px solid #cc0000; 
            position: sticky; top: 0; z-index: 100; 
        }
        .logo-placeholder { 
            font-weight: 800; font-size: 1.5rem; color: #fff; 
            margin-right: 20px; border: 2px solid #cc0000; padding: 5px 10px; 
        }
        .brand-text { font-size: 1.1rem; font-weight: 700; color: #ff3333; text-transform: uppercase; }
        .nav-menu { display: flex; gap: 2rem; margin-left: auto; }
        .nav-menu a { color: #ffffff; text-decoration: none; font-weight: 600; }
        
        /* Hero com Imagem Composta de Fundo */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=1600'); /* Imagem de colagem esportiva */
            background-size: cover; background-position: center; 
            padding: 10rem 2rem; text-align: center; 
        }
        .hero h1 { font-size: 3.5rem; text-transform: uppercase; margin-bottom: 1rem; }
        .btn-destaque { 
            display: inline-block; margin-top: 2rem; background-color: #cc0000; 
            color: #fff; padding: 1rem 2rem; border-radius: 50px; text-decoration: none; font-weight: bold; 
        }
        
        /* Galeria */
        .section { padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .card { background: #151515; border-radius: 15px; overflow: hidden; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-info { padding: 1.5rem; }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-placeholder">SAF</div>
        <span class="brand-text">Superação em Cada Click</span>
        <nav class="nav-menu">
            <a href="#inicio">Início</a>
            <a href="#galeria">Galeria</a>
        </nav>
    </header>

    <section id="inicio" class="hero">
        <h1>SUPERAÇÃO <span style="color:#cc0000">NO ESPORTE</span></h1>
        <p>Capturando a intensidade de cada modalidade.</p>
        <a href="#galeria" class="btn-destaque">Ver Galeria</a>
    </section>

    <section id="galeria" class="section">
        <h2 style="text-align:center; margin-bottom: 3rem;">Registros que Inspiram</h2>
        <div class="gallery-grid" id="galleryGrid"></div>
    </section>

    <script>
        const imagens = [
            { src: "https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=600", title: "Jiu Jitsu", desc: "Técnica e disciplina no tatame." },
            { src: "https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=600", title: "Atletismo", desc: "Força bruta e velocidade." }
        ];
        const grid = document.getElementById('galleryGrid');
        imagens.forEach(img => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${img.src}" alt="${img.title}">
                    <div class="card-info"><h3>${img.title}</h3><p>${img.desc}</p></div>
                </div>
            `;
        });
    </script>
</body>
</html>
