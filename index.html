<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAção Fotos | Fotografia Esportiva</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #0a0a0a; color: #f0f0f0; line-height: 1.6; scroll-behavior: smooth; }
        
        /* Navbar */
        .top-bar { background-color: #000000; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #cc0000; position: sticky; top: 0; z-index: 100; }
        .logo { height: 50px; width: auto; }
        .nav-menu { display: flex; gap: 2rem; }
        .nav-menu a { color: #ffffff; text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .nav-menu a:hover { color: #ff3333; }
        
        /* Hero */
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), #1a0a0a; padding: 6rem 2rem; text-align: center; }
        .hero h1 { font-size: 3.5rem; text-transform: uppercase; margin-bottom: 1rem; color: #fff; }
        .highlight-red { color: #ff3333; }
        .btn-destaque { display: inline-block; margin-top: 2rem; background-color: #cc0000; color: #fff; padding: 1rem 2rem; border-radius: 50px; text-decoration: none; font-weight: bold; }
        
        /* Sections */
        .section { padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 2.5rem; text-align: center; margin-bottom: 3rem; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .card { background: #151515; border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(204,0,0,0.2); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-info { padding: 1.5rem; }
        
        /* Footer */
        footer { background: #000; padding: 2rem; text-align: center; border-top: 1px solid #333; }
        
        @media (max-width: 768px) { .nav-menu { display: none; } }
    </style>
</head>
